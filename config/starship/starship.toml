# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = false

command_timeout = 1000

format = """
$character\
$os$hostname\
$directory\
$git_branch\
$git_status \
$python\
$aws\
$golang\
$java\
$nodejs\
$rust\
$ruby\
$scala\
$dart\
$conda\
$pijul_channel\
$lua\
$rlang\
$package\
$buf\
$memory_usage\
$docker_context\
[](#1C3A5E)$time[ ](#1C3A5E)$cmd_duration
[‚ĒĒ‚ĒÄ>](bold green) """

continuation_prompt = '‚Ė∂‚Ė∂ '

# Replace the '‚ĚĮ' symbol in the prompt with '‚ěú'
[character] # The name of the module we are configuring is 'character'
success_symbol = "ūüöÄ "
error_symbol = "ūüĒ• "

[time]
disabled = false
time_format = "%r" # Hour:Minute Format
style = "bg:#1d2230"
format = '[[ ůĪĎć $time ](bg:#1C3A5E fg:#8DFBD2)]($style)'

[cmd_duration]
format = 'last command: [$duration](bold yellow)'

# ---

[os]
format = '[$symbol](bold white) '   
disabled = false

# Shows the hostname
[hostname]
ssh_only = false
format = 'on [$hostname](bold yellow) '
disabled = false
ssh_symbol = " "

# Shows current directory
[directory]
truncation_length = 3
home_symbol = 'ůįčú ~'
read_only_style = '197'
read_only = '  '
format = 'at [$path]($style)[$read_only]($read_only_style) '

# Shows current git branch
[git_branch]
symbol = " "
format = 'via [$symbol$branch]($style)'
# truncation_length = 4
truncation_symbol = '‚Ä¶/'
style = 'bold green'

# Shows current git status
[git_status]
format = '[$all_status$ahead_behind]($style) '
style = 'bold green'
conflicted = 'ūüŹ≥'
up_to_date = ''
untracked = ' '
ahead = '‚á°${count}'
diverged = '‚áē‚á°${ahead_count}‚á£${behind_count}'
behind = '‚á£${count}'
stashed = ' '
modified = ' '
staged = '[++\($count\)](green)'
renamed = 'Ť•Ā '
deleted = ' '

